<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Heatmap - MapLibre + deck.gl</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>html, body, #map { height: 100%; margin: 0; }</style>

    <!-- MapLibre + deck.gl (no keys) -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css">
    <script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/deck.gl@8.9.36/dist.min.js"></script>
    <script src="https://unpkg.com/@deck.gl/mapbox@8.9.36/dist.min.js"></script>
</head>
<body>
<div id="map"></div>

<script>
    function getParams() {
      const params = new URLSearchParams(location.hash.slice(1));
      const lat = parseFloat(params.get('lat')) || -26.2041;
      const lng = parseFloat(params.get('lng')) || 28.0473;
      const zoom = parseFloat(params.get('zoom')) || 12;
      const api = params.get('api') || ' https://playstation-versus-pictures-odds.trycloudflare.com'; // Use HTTPS for GitHub Pages
      return { lat, lng, zoom, api };
    }

    const { lat, lng, zoom, api } = getParams();

    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          osm: {
            type: 'raster',
            tiles: ['https://a.tile.openstreetmap.org/{z}/{x}/{y}.png'],
            tileSize: 256,
            attribution: '© OpenStreetMap contributors'
          }
        },
        layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
      },
      center: [lng, lat],
      zoom,
      dragPan: true,
      scrollZoom: true
    });

    // Add zoom / rotation controls for easier interaction
    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    // deck.gl overlay that stays in sync with the MapLibre camera
    let deckOverlay;

    // Helper: compute bounds from [{position:[lng,lat]}]
    function getBoundsFromPoints(data) {
      let minLng = Infinity, minLat = Infinity, maxLng = -Infinity, maxLat = -Infinity;
      for (const d of data) {
        const p = d && d.position;
        if (!p || p.length !== 2) continue;
        const [x, y] = p.map(Number);
        if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
        if (x < minLng) minLng = x;
        if (x > maxLng) maxLng = x;
        if (y < minLat) minLat = y;
        if (y > maxLat) maxLat = y;
      }
      if (!Number.isFinite(minLng)) return null;
      return [[minLng, minLat], [maxLng, maxLat]];
    }

    async function fetchPointsNoBbox(limit = 300000) {
      const url = new URL('/points', api);
      url.searchParams.set('limit', String(limit));
      console.log('[CLIENT] fetching', url.toString());
      const resp = await fetch(url.toString(), { mode: 'cors' });
      console.log('[CLIENT] status', resp.status);
      if (!resp.ok) throw new Error(`API ${resp.status}`);
      const arr = await resp.json();
      console.log('[CLIENT] points received:', Array.isArray(arr) ? arr.length : typeof arr, arr[0]);

      // Hard validation of positions
      const bad = arr.filter(d => !d || !Array.isArray(d.position) || d.position.length !== 2 ||
        !Number.isFinite(+d.position[0]) || !Number.isFinite(+d.position[1]));
      if (bad.length) {
        console.warn('[CLIENT] invalid positions found, sample:', bad.slice(0, 3));
      }
      return arr;
    }

    function setLayers(data) {
      const layers = [
        new deck.HeatmapLayer({
          id: 'heat',
          data,
          getPosition: d => d.position,     // expects [lng, lat]
          getWeight: d => d.weight ?? 1,    // default weight
          radiusPixels: 70,                  // larger radius shows heat sooner
          intensity: 1.5,                    // stronger heat
          threshold: 0.01,                   // lower threshold reveals more
          opacity: 0.6,
          colorRange: [
            [33,102,172,80],
            [67,147,195,160],
            [146,197,222,200],
            [209,229,240,220],
            [253,219,199,240],
            [244,165,130,255],
            [214,96,77,255],
            [178,24,43,255]
          ],
          // gpuAggregation: true,          // you can toggle this; depends on device
        }),
        new deck.ScatterplotLayer({
          id: 'debug-points',
          data,
          getPosition: d => d.position,
          getRadius: 25,
          radiusMinPixels: 2,
          getFillColor: [0, 128, 255, 200]
        })
      ];

      if (deckOverlay) {
        deckOverlay.setProps({ layers });
      }
    }

    map.on('load', async () => {
      // Create deck.gl overlay bound to the MapLibre map
      deckOverlay = new deck.MapboxOverlay({
        interleaved: true,
        layers: []
      });
      map.addControl(deckOverlay);

      const data = await fetchPointsNoBbox(300000);

      // Auto-fit the camera to your points so panning/zooming starts from a good view
      const bounds = getBoundsFromPoints(data);
      if (bounds) {
        console.log('[CLIENT] fitting to bounds', bounds);
        map.fitBounds(bounds, { padding: 80, animate: true, duration: 800 });
      } else {
        console.warn('[CLIENT] No bounds computed; data may be empty or invalid');
      }

      setLayers(data);
    });
</script>
</body>
</html>
